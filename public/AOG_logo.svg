<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="18%" stop-color="#0A43B5"/>
      <stop offset="55%" stop-color="#022A83"/>
      <stop offset="100%" stop-color="#061A4D"/>
    </linearGradient>
    <linearGradient id="blueHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8D8FF" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#7AC8FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE28A"/>
      <stop offset="20%" stop-color="#FFD24D"/>
      <stop offset="55%" stop-color="#F5B400"/>
      <stop offset="100%" stop-color="#C98700"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF2B5" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .outlineBlue { stroke: #04163c; stroke-width: 6; stroke-linejoin: round; }
      .outlineGold { stroke: #b77a00; stroke-width: 4; stroke-linejoin: round; }
      .glintLine { stroke: white; stroke-width: 3.5; stroke-linecap: round; opacity: 0.9; }
    </style>
  </defs>

  <!-- A -->
  <path d="M85 500 L320 85 L555 500 L470 500 L320 225 L170 500 Z" fill="url(#blueGrad)" class="outlineBlue"/>
  <path d="M145 480 L320 145 L495 480" fill="none" stroke="url(#blueHighlight)" stroke-width="12" opacity="0.8"/>
  <path d="M320 305 L415 465 L225 465 Z" fill="url(#goldGrad)" class="outlineGold"/>
  <path d="M320 326 L391 447 L249 447 Z" fill="url(#goldHighlight)" opacity="0.65"/>

  <!-- O -->
  <circle cx="835" cy="295" r="170" fill="none" stroke="url(#blueGrad)" stroke-width="78"/>
  <circle cx="835" cy="295" r="170" fill="none" stroke="#04163c" stroke-width="6"/>
  <path d="M735 145 A170 170 0 0 1 935 440" fill="none" stroke="url(#blueHighlight)" stroke-width="10" opacity="0.85"/>

  <!-- G -->
  <g>
    <circle cx="1280" cy="295" r="170" fill="none" stroke="url(#blueGrad)" stroke-width="78" stroke-dasharray="785 175" stroke-dashoffset="85" transform="rotate(0 1280 295)"/>
    <circle cx="1280" cy="295" r="170" fill="none" stroke="#04163c" stroke-width="6" stroke-dasharray="785 175" stroke-dashoffset="85"/>
    <path d="M1188 145 A170 170 0 0 1 1377 428" fill="none" stroke="url(#blueHighlight)" stroke-width="10" opacity="0.85"/>
    <path d="M1338 373 H1465 V448" fill="none" stroke="url(#blueGrad)" stroke-width="78" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M1338 373 H1465 V448" fill="none" stroke="#04163c" stroke-width="6"/>
    <path d="M1350 364 H1452" fill="none" stroke="url(#blueHighlight)" stroke-width="8" opacity="0.7"/>
  </g>

  <!-- SERVICES text -->
  <text x="85" y="635" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="125" font-weight="700" letter-spacing="28" fill="url(#goldGrad)" stroke="#B77A00" stroke-width="2">SERVICES</text>
  <text x="85" y="635" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="125" font-weight="700" letter-spacing="28" fill="url(#goldHighlight)" opacity="0.55">SERVICES</text>

  <!-- Sparkle glints -->
  <g filter="url(#tinyGlow)">
    <g transform="translate(160 170)">
      <line x1="0" y1="-20" x2="0" y2="20" class="glintLine"/>
      <line x1="-20" y1="0" x2="20" y2="0" class="glintLine"/>
      <line x1="-14" y1="-14" x2="14" y2="14" class="glintLine" opacity="0.65"/>
      <line x1="-14" y1="14" x2="14" y2="-14" class="glintLine" opacity="0.65"/>
    </g>
    <g transform="translate(365 395)">
      <line x1="0" y1="-18" x2="0" y2="18" class="glintLine"/>
      <line x1="-18" y1="0" x2="18" y2="0" class="glintLine"/>
    </g>
    <g transform="translate(695 170)">
      <line x1="0" y1="-18" x2="0" y2="18" class="glintLine"/>
      <line x1="-18" y1="0" x2="18" y2="0" class="glintLine"/>
    </g>
    <g transform="translate(985 405)">
      <line x1="0" y1="-18" x2="0" y2="18" class="glintLine"/>
      <line x1="-18" y1="0" x2="18" y2="0" class="glintLine"/>
    </g>
    <g transform="translate(1125 215)">
      <line x1="0" y1="-16" x2="0" y2="16" class="glintLine"/>
      <line x1="-16" y1="0" x2="16" y2="0" class="glintLine"/>
    </g>
    <g transform="translate(1490 375)">
      <line x1="0" y1="-16" x2="0" y2="16" class="glintLine"/>
      <line x1="-16" y1="0" x2="16" y2="0" class="glintLine"/>
    </g>
  </g>
</svg>
